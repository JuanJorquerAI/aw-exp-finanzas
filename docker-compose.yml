version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: aw_finanzas
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
